<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Notification</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #F3F4F6;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      color: #111827;
    }

    .wrap {
      width: 100%;
      padding: 28px 12px;
    }

    .card {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      background: #FFFFFF;
      border: 1px solid #E5E7EB;
      border-radius: 18px;
      overflow: hidden;
    }

    .header {
      background: #FFFFFF;
      border-bottom: 1px solid #E5E7EB;
      padding: 18px 24px;
    }

    .headerRow {
      width: 100%;
      border-collapse: collapse;
    }

    .icon {
      display: inline-block;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: #2563EB;
      color: #FFFFFF;
      text-align: center;
      line-height: 40px;
      font-weight: 900;
      font-size: 14px;
    }

    .headTitle {
      margin: 0;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #111827;
    }

    .headSub {
      margin: 4px 0 0;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #9CA3AF;
    }

    .date {
      font-size: 11px;
      color: #9CA3AF;
      font-weight: 700;
      text-align: right;
    }

    .content {
      padding: 26px 24px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 18px;
      line-height: 24px;
      color: #111827;
    }

    p {
      margin: 0 0 14px;
      font-size: 14px;
      line-height: 20px;
      color: #374151;
    }

    .panel {
      margin: 18px 0 18px;
      background: #EFF6FF;
      border: 1px solid #BFDBFE;
      border-left: 4px solid #2563EB;
      border-radius: 14px;
      padding: 16px 16px;
    }

    .panel p {
      margin: 0;
      color: #1F2937;
    }

    .btn {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 900;
      font-size: 14px;
      line-height: 16px;
    }

    .btn-primary {
      background: #2563EB;
      color: #FFFFFF;
    }

    .center {
      text-align: center;
    }

    .footer {
      background: #F9FAFB;
      border-top: 1px solid #E5E7EB;
      padding: 16px 24px;
      color: #6B7280;
      font-size: 12px;
      line-height: 18px;
    }

    .footerRow {
      width: 100%;
      border-collapse: collapse;
    }

    .link {
      color: #2563EB;
      font-weight: 900;
      text-decoration: none;
      font-size: 11px;
    }
  </style>
</head>

<body>
  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse:collapse;">
    <tr>
      <td class="wrap" align="center">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%"
          style="border-collapse:collapse; max-width:720px;">
          <tr>
            <td>
              <div class="card">
                <div class="header">
                  <table role="presentation" class="headerRow" cellpadding="0" cellspacing="0" border="0">
                    <tr>
                      <td style="width:52px; vertical-align:middle;">
                        <span class="icon">{{iconText}}</span>
                      </td>
                      <td style="vertical-align:middle;">
                        <p class="headTitle">{{notificationType}}</p>
                        <p class="headSub">PWIOI Placement Portal</p>
                      </td>
                      <td style="vertical-align:middle;">
                        <div class="date">{{date}}</div>
                      </td>
                    </tr>
                  </table>
                </div>

                <div class="content">
                  <h1>{{title}}</h1>
                  <p>Hello {{userName}},</p>
                  <p>
                    {{message}}
                  </p>

                  <div class="panel">
                    <p>{{panelMessage}}</p>
                  </div>

                  <div class="center" style="margin-top:18px;">
                    <a class="btn btn-primary" href="{{actionUrl}}">{{actionText}}</a>
                  </div>
                </div>

                <div class="footer">
                  <table role="presentation" class="footerRow" cellpadding="0" cellspacing="0" border="0">
                    <tr>
                      <td style="vertical-align:middle;">
                        © 2026 PW Institute of Innovation
                      </td>
                      <td style="vertical-align:middle; text-align:right;">
                        <a class="link" href="{{supportUrl}}">Support Center</a>
                        <span style="display:inline-block; width:10px;"></span>
                        <a class="link" href="{{privacyUrl}}">Privacy Policy</a>
                      </td>
                    </tr>
                  </table>
                </div>
              </div>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>

</html>
